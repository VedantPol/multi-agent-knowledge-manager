services:
  mak:
    image: vedantpol/multi-agent-knowledge-manager:latest
    container_name: mak
    restart: unless-stopped
    mem_limit: 768m
    memswap_limit: 768m
    environment:
      MALLOC_ARENA_MAX: "2"
    env_file:
      - path: .env
        required: false
    ports:
      - "8723:8000"
    volumes:
      - mak_data:/data

volumes:
  mak_data:
